<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Wiki — Knowledge Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  header .meta { font-size: 11px; color: #8b949e; }
  .legend {
    display: flex;
    gap: 16px;
    padding: 8px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    font-size: 12px;
    z-index: 10;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; cursor: pointer; opacity: 1; transition: opacity .2s; }
  .legend-item.dimmed { opacity: 0.3; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  #canvas { flex: 1; cursor: grab; }
  #canvas:active { cursor: grabbing; }
  #tooltip {
    position: fixed;
    background: #1c2333;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.5;
    pointer-events: none;
    display: none;
    z-index: 100;
    max-width: 260px;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  #tooltip .tt-title { font-weight: 600; color: #f0f6fc; font-size: 13px; margin-bottom: 4px; }
  #tooltip .tt-domain { font-size: 11px; color: #8b949e; }
  #tooltip .tt-desc { color: #c9d1d9; margin-top: 4px; }
  #tooltip .tt-links { color: #58a6ff; margin-top: 4px; font-size: 11px; }
</style>
</head>
<body>

<header>
  <h1>🧠 LLM Wiki — Knowledge Graph</h1>
  <div class="meta" id="timestamp"></div>
</header>

<div class="legend" id="legend"></div>

<canvas id="canvas"></canvas>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-domain"></div>
  <div class="tt-desc"></div>
  <div class="tt-links"></div>
</div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const GROUPS = {
  work:     { label: 'Work Projects',  color: '#4A90D9', glow: '#4A90D933' },
  life:     { label: 'Life Projects',  color: '#7BC67E', glow: '#7BC67E33' },
  shared:   { label: 'Shared',         color: '#F5A623', glow: '#F5A62333' },
  pattern:  { label: 'Patterns',       color: '#B8A9C9', glow: '#B8A9C933' },
  topic:    { label: 'Topics',         color: '#F7DC6F', glow: '#F7DC6F33' },
  archived: { label: 'Archived',       color: '#666666', glow: '#66666633' },
  decision: { label: 'Decisions',      color: '#58a6ff', glow: '#58a6ff33' },
};

const nodes = [
  // Shared
  { id: 'boss-profile',     label: 'boss-profile',         group: 'shared',   desc: '能力图谱·偏好·背景', size: 18 },
  { id: 'coding-style',     label: 'coding-style',         group: 'shared',   desc: '编码风格与技术偏好', size: 10 },
  { id: 'growth-tracker',   label: 'growth-tracker',       group: 'shared',   desc: '成长目标与进展', size: 10 },
  // Work
  { id: 'afi',   label: 'ai-frontier-insight', group: 'work', desc: '100+源 多源采集+日报+周报', size: 16 },
  { id: 'dnd',   label: 'daily-news-digest',   group: 'work', desc: 'GitHub Actions 全自动新闻摘要', size: 13 },
  { id: 'xm',    label: 'x-monitor',           group: 'work', desc: 'X/Twitter List 监控 → 已合并到 AFI', size: 11 },
  { id: 'ids',   label: 'interview-digest',    group: 'work', desc: '访谈链接 → 结构化摘要', size: 10 },
  { id: 'tw',    label: 'transcript-writer',   group: 'work', desc: '会议录音 → 文字纪要', size: 10 },
  { id: 'and',   label: 'ai-news-daily',       group: 'archived', desc: '已被 daily-news-digest 替代', size: 8 },
  { id: 'pt',    label: 'prompt-tuning',       group: 'decision', desc: 'signal/insight prompt 调优历史', size: 11 },
  // Life
  { id: 'ias',   label: 'intern-agent-system', group: 'life', desc: 'Mr.Krabs + wiki + 飞书/微信接入', size: 17 },
  { id: 'ic',    label: 'intern-clawd',        group: 'life', desc: '公开版·影响力载体·3 营销叙事', size: 13 },
  { id: 'sh',    label: 'skillhub',            group: 'life', desc: 'Agent Skill 平台 (PRD 阶段)', size: 12 },
  { id: 'dt',    label: 'digital-twin',        group: 'life', desc: '数字分身网站·脱敏 context', size: 12 },
  { id: 'si',    label: 'summer-internship',   group: 'life', desc: '暑期实习投递 · 已投5家 待投25家', size: 11 },
  { id: 'pb',    label: 'personal-brand',     group: 'life', desc: '个人影响力计划 · GH 100★ 小红书 100赞', size: 13 },
  // Topic
  { id: 'acd',   label: 'context-dividend',    group: 'topic', desc: 'AI 是 Gen Z 时代红利，Context 护城河', size: 12 },
  // Patterns
  { id: 'p1', label: '安全约束分层',       group: 'pattern', desc: 'Agent 安全约束分层设计', size: 8 },
  { id: 'p2', label: 'Hook PATH 陷阱',    group: 'pattern', desc: '非交互式 shell PATH 问题', size: 8 },
  { id: 'p3', label: '写入前确认',         group: 'pattern', desc: 'Wiki 写入前必须获权限确认', size: 8 },
  { id: 'p4', label: 'System Card 提取',  group: 'pattern', desc: '从 System Card 提取安全架构约束', size: 7 },
  { id: 'p5', label: 'daemon 诊断',       group: 'pattern', desc: '多组件 daemon 链路端到端诊断法', size: 8 },
  { id: 'p6', label: '概念-实践图谱',     group: 'pattern', desc: '概念-实践知识图谱法', size: 7 },
  { id: 'p7', label: '复盘转素材',         group: 'pattern', desc: '个人项目复盘转面试素材', size: 8 },
  { id: 'p8', label: 'Patch 降级',        group: 'pattern', desc: '权限受阻时的完整 Patch 降级方案', size: 7 },
  { id: 'p9', label: '信号 Landscape',    group: 'pattern', desc: '信号 Landscape 展示法', size: 8 },
];

const edges = [
  // Work 域内
  { from: 'afi', to: 'dnd', label: '互补' },
  { from: 'dnd', to: 'afi', label: '互补' },
  { from: 'xm',  to: 'afi', label: '数据源' },
  { from: 'afi', to: 'pt',  label: '调优' },
  { from: 'dnd', to: 'pt',  label: '调优' },
  { from: 'and', to: 'dnd', label: '已替代' },
  { from: 'ids', to: 'tw',  label: '相关' },
  { from: 'tw',  to: 'ids', label: '相关' },
  { from: 'ids', to: 'dnd', label: '引用' },
  // Life 域内
  { from: 'ic',  to: 'ias', label: '公开版' },
  { from: 'ic',  to: 'dt',  label: '展示' },
  { from: 'ic',  to: 'acd', label: '理论' },
  { from: 'dt',  to: 'ias', label: '关联' },
  { from: 'dt',  to: 'sh',  label: '关联' },
  // 跨域
  { from: 'boss-profile', to: 'afi', label: '工作' },
  { from: 'boss-profile', to: 'dnd', label: '工作' },
  { from: 'boss-profile', to: 'xm',  label: '工作' },
  { from: 'boss-profile', to: 'ias', label: '个人' },
  { from: 'boss-profile', to: 'ic',  label: '个人' },
  { from: 'boss-profile', to: 'dt',  label: '个人' },
  { from: 'boss-profile', to: 'sh',  label: '个人' },
  { from: 'boss-profile', to: 'si',  label: '个人' },
  { from: 'boss-profile', to: 'pb',  label: '个人' },
  // personal-brand 关联
  { from: 'pb',  to: 'ic',  label: '推广载体' },
  { from: 'pb',  to: 'dt',  label: '展示窗口' },
  { from: 'pb',  to: 'si',  label: '变现场景' },
  { from: 'pb',  to: 'sh',  label: 'skill 下载' },
  { from: 'pb',  to: 'acd', label: '理论基础' },
  // Patterns → Projects
  { from: 'p1', to: 'ias', label: '设计于' },
  { from: 'p2', to: 'ias', label: '踩坑于' },
  { from: 'p3', to: 'ias', label: '踩坑于' },
  { from: 'p5', to: 'ias', label: '踩坑于' },
  { from: 'p9', to: 'afi', label: '用于' },
  { from: 'p7', to: 'si',  label: '服务于' },
];

// ═══════════════════════════════════════
// PHYSICS SIMULATION
// ═══════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = canvas.clientWidth * devicePixelRatio;
  H = canvas.height = canvas.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Init positions in a circle
const cx = canvas.clientWidth / 2, cy = canvas.clientHeight / 2;
nodes.forEach((n, i) => {
  const angle = (i / nodes.length) * Math.PI * 2;
  const r = 180 + Math.random() * 60;
  n.x = cx + Math.cos(angle) * r;
  n.y = cy + Math.sin(angle) * r;
  n.vx = 0;
  n.vy = 0;
});

const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

// Pan & zoom state
let panX = 0, panY = 0, zoom = 1;
let dragging = null, dragOffX = 0, dragOffY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPX = 0, panStartPY = 0;
let hoveredNode = null;

// Legend filter
const hiddenGroups = new Set();

function screenToWorld(sx, sy) {
  return { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
}

function findNode(sx, sy) {
  const { x, y } = screenToWorld(sx, sy);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const r = n.size + 4;
    if ((n.x - x) ** 2 + (n.y - y) ** 2 < (r * 1.5) ** 2) return n;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const n = findNode(e.offsetX, e.offsetY);
  if (n) {
    dragging = n;
    const w = screenToWorld(e.offsetX, e.offsetY);
    dragOffX = n.x - w.x;
    dragOffY = n.y - w.y;
    n.fx = n.x; n.fy = n.y;
  } else {
    isPanning = true;
    panStartX = e.offsetX; panStartY = e.offsetY;
    panStartPX = panX; panStartPY = panY;
  }
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    const w = screenToWorld(e.offsetX, e.offsetY);
    dragging.fx = w.x + dragOffX;
    dragging.fy = w.y + dragOffY;
    dragging.x = dragging.fx;
    dragging.y = dragging.fy;
  } else if (isPanning) {
    panX = panStartPX + (e.offsetX - panStartX);
    panY = panStartPY + (e.offsetY - panStartY);
  } else {
    const n = findNode(e.offsetX, e.offsetY);
    hoveredNode = n;
    canvas.style.cursor = n ? 'pointer' : 'grab';

    const tt = document.getElementById('tooltip');
    if (n) {
      const g = GROUPS[n.group];
      tt.querySelector('.tt-title').textContent = n.label;
      tt.querySelector('.tt-domain').textContent = g.label;
      tt.querySelector('.tt-domain').style.color = g.color;
      tt.querySelector('.tt-desc').textContent = n.desc;
      // Find connections
      const conns = edges.filter(e => e.from === n.id || e.to === n.id)
        .map(e => {
          const other = e.from === n.id ? e.to : e.from;
          return `${e.label} → ${nodeMap[other]?.label || other}`;
        });
      tt.querySelector('.tt-links').textContent = conns.length ? '🔗 ' + conns.join('  ·  ') : '';
      tt.style.display = 'block';
      tt.style.left = Math.min(e.clientX + 14, window.innerWidth - 280) + 'px';
      tt.style.top = (e.clientY + 14) + 'px';
    } else {
      tt.style.display = 'none';
    }
  }
});

canvas.addEventListener('mouseup', () => {
  if (dragging) { delete dragging.fx; delete dragging.fy; }
  dragging = null;
  isPanning = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const oldZoom = zoom;
  zoom *= e.deltaY > 0 ? 0.92 : 1.08;
  zoom = Math.max(0.3, Math.min(3, zoom));
  panX = e.offsetX - (e.offsetX - panX) * (zoom / oldZoom);
  panY = e.offsetY - (e.offsetY - panY) * (zoom / oldZoom);
}, { passive: false });

// ═══════════════════════════════════════
// LEGEND
// ═══════════════════════════════════════
const legendEl = document.getElementById('legend');
Object.entries(GROUPS).forEach(([key, g]) => {
  const count = nodes.filter(n => n.group === key).length;
  if (count === 0) return;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${g.color}"></span>${g.label} (${count})`;
  item.addEventListener('click', () => {
    if (hiddenGroups.has(key)) { hiddenGroups.delete(key); item.classList.remove('dimmed'); }
    else { hiddenGroups.add(key); item.classList.add('dimmed'); }
  });
  legendEl.appendChild(item);
});

// ═══════════════════════════════════════
// SIMULATION TICK
// ═══════════════════════════════════════
function tick() {
  const alpha = 0.3;

  // Center gravity
  nodes.forEach(n => {
    n.vx += (cx - n.x) * 0.0005;
    n.vy += (cy - n.y) * 0.0005;
  });

  // Repulsion (all pairs)
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const force = 1200 / (dist * dist);
      const fx = dx / dist * force;
      const fy = dy / dist * force;
      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
    }
  }

  // Spring (edges)
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    let dx = b.x - a.x, dy = b.y - a.y;
    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const target = 120;
    const force = (dist - target) * 0.006;
    const fx = dx / dist * force;
    const fy = dy / dist * force;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  });

  // Group clustering
  const groupCenters = {};
  Object.keys(GROUPS).forEach(g => {
    const gn = nodes.filter(n => n.group === g);
    if (!gn.length) return;
    groupCenters[g] = {
      x: gn.reduce((s, n) => s + n.x, 0) / gn.length,
      y: gn.reduce((s, n) => s + n.y, 0) / gn.length,
    };
  });
  nodes.forEach(n => {
    const gc = groupCenters[n.group];
    if (gc) {
      n.vx += (gc.x - n.x) * 0.003;
      n.vy += (gc.y - n.y) * 0.003;
    }
  });

  // Velocity damping + update
  nodes.forEach(n => {
    if (n.fx !== undefined) { n.x = n.fx; n.y = n.fy; n.vx = 0; n.vy = 0; return; }
    n.vx *= 0.85;
    n.vy *= 0.85;
    n.x += n.vx * alpha;
    n.y += n.vy * alpha;
  });
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function draw() {
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  ctx.clearRect(0, 0, cw, ch);
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  const visibleNodes = new Set(nodes.filter(n => !hiddenGroups.has(n.group)).map(n => n.id));

  // Edges
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    if (!visibleNodes.has(a.id) || !visibleNodes.has(b.id)) return;

    const isHighlight = hoveredNode && (e.from === hoveredNode.id || e.to === hoveredNode.id);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = isHighlight ? '#58a6ff' : 'rgba(88,166,255,0.12)';
    ctx.lineWidth = isHighlight ? 1.8 : 0.8;
    ctx.stroke();

    // Edge label on hover
    if (isHighlight && e.label) {
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      ctx.font = '9px -apple-system, sans-serif';
      ctx.fillStyle = '#8b949e';
      ctx.textAlign = 'center';
      ctx.fillText(e.label, mx, my - 4);
    }
  });

  // Nodes
  nodes.forEach(n => {
    if (!visibleNodes.has(n.id)) return;
    const g = GROUPS[n.group];
    const isHovered = hoveredNode === n;
    const isConnected = hoveredNode && edges.some(e =>
      (e.from === hoveredNode.id && e.to === n.id) ||
      (e.to === hoveredNode.id && e.from === n.id)
    );
    const dimmed = hoveredNode && !isHovered && !isConnected;

    // Glow
    if (isHovered) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size + 10, 0, Math.PI * 2);
      ctx.fillStyle = g.glow;
      ctx.fill();
    }

    // Circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
    ctx.fillStyle = dimmed ? g.color + '40' : g.color;
    ctx.fill();
    ctx.strokeStyle = isHovered ? '#fff' : (dimmed ? 'transparent' : g.color + '80');
    ctx.lineWidth = isHovered ? 2 : 1;
    ctx.stroke();

    // Label
    ctx.font = `${isHovered ? 'bold ' : ''}${Math.max(10, 11)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = dimmed ? '#8b949e60' : '#c9d1d9';
    ctx.fillText(n.label, n.x, n.y + n.size + 5);
  });

  ctx.restore();
}

function loop() {
  tick();
  draw();
  requestAnimationFrame(loop);
}
loop();

document.getElementById('timestamp').textContent =
  '更新于 ' + new Date().toLocaleString('zh-CN', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
</script>

</body>
</html>
