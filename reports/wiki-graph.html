const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
function resize() { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; }
window.addEventListener('resize', resize); resize();

const nodeMap = {};
nodes.forEach(n => {
  n.x = W/2 + (Math.random()-0.5) * W * 0.6;
  n.y = H/2 + (Math.random()-0.5) * H * 0.6;
  n.vx = 0; n.vy = 0;
  nodeMap[n.id] = n;
});

const cx = W/2, cy = H/2;
let zoom = 1, panX = 0, panY = 0;
let dragging = null, dragOffX = 0, dragOffY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPX = 0, panStartPY = 0;
let hoveredNode = null;
const hiddenGroups = new Set();

function screenToWorld(sx, sy) { return { x: (sx - panX) / zoom, y: (sy - panY) / zoom }; }
function findNode(sx, sy) {
  const w = screenToWorld(sx, sy);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (hiddenGroups.has(n.group)) continue;
    const dx = n.x - w.x, dy = n.y - w.y;
    if (dx*dx + dy*dy <= (n.size+4)*(n.size+4)) return n;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const n = findNode(e.offsetX, e.offsetY);
  if (n) {
    dragging = n;
    const w = screenToWorld(e.offsetX, e.offsetY);
    dragOffX = n.x - w.x; dragOffY = n.y - w.y;
  } else {
    isPanning = true;
    panStartX = e.offsetX; panStartY = e.offsetY;
    panStartPX = panX; panStartPY = panY;
  }
});
canvas.addEventListener('mousemove', e => {
  if (dragging) {
    const w = screenToWorld(e.offsetX, e.offsetY);
    dragging.fx = w.x + dragOffX; dragging.fy = w.y + dragOffY;
    dragging.x = dragging.fx; dragging.y = dragging.fy;
  } else if (isPanning) {
    panX = panStartPX + (e.offsetX - panStartX);
    panY = panStartPY + (e.offsetY - panStartY);
  } else {
    const n = findNode(e.offsetX, e.offsetY);
    hoveredNode = n;
    canvas.style.cursor = n ? 'pointer' : 'grab';
    const tt = document.getElementById('tooltip');
    if (n) {
      const g = GROUPS[n.group];
      tt.querySelector('.tt-title').textContent = n.label;
      tt.querySelector('.tt-domain').textContent = g.label;
      tt.querySelector('.tt-domain').style.color = g.color;
      tt.querySelector('.tt-desc').textContent = n.desc || '';
      const conns = edges.filter(e => e.from === n.id || e.to === n.id)
        .map(e => { const other = e.from === n.id ? e.to : e.from;
          return `${e.label} → ${nodeMap[other]?.label || other}`; });
      tt.querySelector('.tt-links').textContent = conns.length ? '🔗 ' + conns.join('  ·  ') : '';
      tt.style.display = 'block';
      tt.style.left = Math.min(e.clientX + 14, window.innerWidth - 280) + 'px';
      tt.style.top = (e.clientY + 14) + 'px';
    } else { tt.style.display = 'none'; }
  }
});
canvas.addEventListener('mouseup', () => {
  if (dragging) { delete dragging.fx; delete dragging.fy; }
  dragging = null; isPanning = false;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const oldZoom = zoom;
  zoom *= e.deltaY > 0 ? 0.92 : 1.08;
  zoom = Math.max(0.3, Math.min(3, zoom));
  panX = e.offsetX - (e.offsetX - panX) * (zoom / oldZoom);
  panY = e.offsetY - (e.offsetY - panY) * (zoom / oldZoom);
}, { passive: false });

const legendEl = document.getElementById('legend');
Object.entries(GROUPS).forEach(([key, g]) => {
  const count = nodes.filter(n => n.group === key).length;
  if (count === 0) return;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${g.color}"></span>${g.label} (${count})`;
  item.addEventListener('click', () => {
    if (hiddenGroups.has(key)) { hiddenGroups.delete(key); item.classList.remove('dimmed'); }
    else { hiddenGroups.add(key); item.classList.add('dimmed'); }
  });
  legendEl.appendChild(item);
});

function tick() {
  const alpha = 0.3;
  nodes.forEach(n => {
    n.vx += (cx - n.x) * 0.0005;
    n.vy += (cy - n.y) * 0.0005;
  });
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      const f = 800 / (d*d);
      const fx = dx/d * f, fy = dy/d * f;
      a.vx -= fx; a.vy -= fy; b.vx += fx; b.vy += fy;
    }
  }
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    const k = 0.01 * (d - 180);
    a.vx += dx/d * k; a.vy += dy/d * k;
    b.vx -= dx/d * k; b.vy -= dy/d * k;
  });
  nodes.forEach(n => {
    if (n.fx !== undefined) return;
    n.vx *= 0.88; n.vy *= 0.88;
    n.x += n.vx * alpha; n.y += n.vy * alpha;
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(panX, panY); ctx.scale(zoom, zoom);
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    if (hiddenGroups.has(a.group) || hiddenGroups.has(b.group)) return;
    ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1 / zoom;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  });
  nodes.forEach(n => {
    if (hiddenGroups.has(n.group)) return;
    const g = GROUPS[n.group];
    ctx.fillStyle = g.glow;
    ctx.beginPath(); ctx.arc(n.x, n.y, n.size + 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = g.color;
    ctx.beginPath(); ctx.arc(n.x, n.y, n.size, 0, Math.PI*2); ctx.fill();
    if (n === hoveredNode) {
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2 / zoom; ctx.stroke();
    }
    ctx.fillStyle = '#c9d1d9';
    ctx.font = `${Math.max(10, 11 / zoom)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(n.label, n.x, n.y + n.size + 14);
  });
  ctx.restore();
}

function loop() { tick(); draw(); requestAnimationFrame(loop); }
loop();

document.getElementById('timestamp').textContent =
  'Updated: 2026-04-23 14:50 · ' + nodes.length + ' nodes · ' + edges.length + ' edges';
